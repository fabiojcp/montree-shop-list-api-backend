openapi: '3.0.3'
info:
  title: Montree Shop List API
  description: |
    API REST para gerenciamento de catálogo de itens e lista de compras com compradores aleatórios do GitHub.

    **Features:** Health check, paginação, rate limiting, retry com backoff, response envelope padronizado, X-Request-Id.
  version: '1.0.0'
  contact:
    name: Fabio

servers:
  - url: 'https://montree-shop-list-api-backend.fly.dev'
    description: Produção (Fly.io)
  - url: 'http://localhost:3333'
    description: Desenvolvimento local

paths:
  /health:
    get:
      tags:
        - Health
      summary: Verifica a saúde da aplicação
      responses:
        '200':
          description: Aplicação saudável
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Banco de dados indisponível
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthDownResponse'

  /itens:
    post:
      tags:
        - Itens
      summary: Cria um novo item no catálogo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item criado com sucesso
          headers:
            X-Request-Id:
              schema:
                type: string
              description: ID único da requisição
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemEnvelope'
        '422':
          description: Dados de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    get:
      tags:
        - Itens
      summary: Lista itens com paginação
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Número da página
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Itens por página
      responses:
        '200':
          description: Lista paginada de itens
          headers:
            X-Request-Id:
              schema:
                type: string
              description: ID único da requisição
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItems'

  /compras:
    post:
      tags:
        - Compras
      summary: Cria compra com comprador aleatório do GitHub
      description: |
        Valida o item, consome a API do GitHub, seleciona um usuário aleatório e registra a compra.
        Usa **retry com backoff exponencial** (1s, 2s) em caso de falha 429/5xx da API do GitHub.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompraRequest'
      responses:
        '201':
          description: Compra criada com sucesso
          headers:
            X-Request-Id:
              schema:
                type: string
              description: ID único da requisição
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompraEnvelope'
        '400':
          description: Item fora de estoque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Dados de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '502':
          description: Serviço externo (GitHub) indisponível após retries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Compras
      summary: Lista compras com dados do item relacionado
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Número da página
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Compras por página
      responses:
        '200':
          description: Lista paginada de compras com item incluso
          headers:
            X-Request-Id:
              schema:
                type: string
              description: ID único da requisição
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompras'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: 'up'
        timestamp:
          type: string
          format: date-time
        uptime:
          type: integer
          example: 3600
        latency:
          type: object
          properties:
            database:
              type: string
              example: '3ms'

    HealthDownResponse:
      type: object
      properties:
        status:
          type: string
          example: 'down'
        database:
          type: string
          example: 'disconnected'

    PaginatedMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        lastPage:
          type: integer
          example: 3

    PaginatedItems:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'

    PaginatedCompras:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompraWithItem'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'

    ItemEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Item'

    CompraEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Compra'

    Item:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: 'Notebook'
        preco:
          type: number
          format: float
          example: 3500.00
        qtd_atual:
          type: integer
          example: 10
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateItemRequest:
      type: object
      required:
        - nome
        - preco
        - qtd_atual
      properties:
        nome:
          type: string
          maxLength: 200
          example: 'Notebook'
        preco:
          type: number
          minimum: 0
          maximum: 99999999.99
          example: 3500.00
        qtd_atual:
          type: integer
          minimum: 0
          maximum: 999999
          example: 10

    CreateCompraRequest:
      type: object
      required:
        - item_id
      properties:
        item_id:
          type: integer
          minimum: 1
          example: 1

    Compra:
      type: object
      properties:
        id:
          type: integer
          example: 1
        comprador_github_login:
          type: string
          example: 'torvalds'
        item_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CompraWithItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        comprador_github_login:
          type: string
          example: 'torvalds'
        item_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        item:
          $ref: '#/components/schemas/Item'

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Item fora de estoque'

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              field:
                type: string
              rule:
                type: string
